name: Deploy petition site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'petition-site/**'
      - 'extension/src/data/countries.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: petition-site
    env:
      GITHUB_PAGES: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: petition-site/package-lock.json

      - name: Install
        run: npm ci

      - name: Strip dynamic API routes (incompatible with static export)
        run: |
          rm -rf app/api/sign
          rm -rf app/api/comments
          rm -rf app/api/count

      - name: Build static export
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: petition-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
